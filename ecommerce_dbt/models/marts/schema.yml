version: 2

models:
  - name: dim_customers
    description: Customer dimension table
    columns:
      - name: customer_key
        description: Surrogate key for customer
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Natural key from source system
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null

  - name: dim_products
    description: Product dimension table
    columns:
      - name: product_key
        description: Surrogate key for product
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - unique
          - not_null

  - name: fact_orders
    description: Order fact table
    columns:
      - name: order_key
        tests:
          - unique
          - not_null
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_key
      - name: product_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_key
      - name: total_amount
        tests:
          - not_null
